<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Painel Digital — Igreja Evangélica Holiness de Pompeia</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
:root {
  --red:        #C0392B;
  --red-dark:   #922B21;
  --red-light:  #E74C3C;
  --bg:         #1A1C1E;
  --bg2:        #222528;
  --card:       #2A2D31;
  --card2:      #313539;
  --border:     rgba(192,57,43,0.25);
  --border-s:   rgba(255,255,255,0.07);
  --text:       #F0EDE8;
  --muted:      #888380;
  --white:      #FFFFFF;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html, body {
  margin: 0; 
  padding: 0;
  width: 1920px;
  height: 1080px;
  overflow: hidden;
  background: #1A1C1E;
}

body {
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
  position: absolute;
  top: 0;
  left: 0;
}

#slides-wrap {
  position: absolute;
  width: 1080px !important;
  height: 1920px !important;
  top: 0;
  left: 0;
  transform-origin: 0 0;
  -webkit-transform-origin: 0 0;
  transform: rotate(90deg) translateY(-1920px);
  -webkit-transform: rotate(90deg) translateY(-1920px);
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

/* ══ BG ══ */
.slide-bg{position:absolute;inset:0;pointer-events:none;z-index:0;}
.slide-bg::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 800px 400px at 50% 0%,   rgba(192,57,43,0.08) 0%,transparent 65%),
    radial-gradient(ellipse 400px 600px at 90% 60%,  rgba(192,57,43,0.05) 0%,transparent 60%),
    radial-gradient(ellipse 350px 350px at 10% 85%,  rgba(192,57,43,0.06) 0%,transparent 60%);}
#slides-wrap>*{position:relative;z-index:1;}
.#slides-wrap>.slide-bg{z-index:0;}

/* ══ HEADER ══ */
.site-header{
  padding:36px 60px 28px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;
}
.site-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--red),rgba(192,57,43,0.1),transparent);}
.logo-wrap img {
  height: 48px !important;
  width: 250px !important; /* Força a largura correta para o formato retangular da logo */
  object-fit: contain !important; /* Garante que a imagem não mude de proporção ou distorça */
  display: block;
}
.header-info{text-align:right;}
.header-city{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.header-motto{font-size:14px;font-weight:700;color:var(--red);margin-top:3px;letter-spacing:0.5px;}

/* ══ CLOCK BAR ══ */
.clock-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 60px;
  background:rgba(0,0,0,0.25);
  border-bottom:1px solid var(--border-s);
  flex-shrink:0;
}
.clock-time{font-family:'Lora',serif;font-size:72px;font-weight:700;color:var(--red);letter-spacing:2px;line-height:1;font-variant-numeric:tabular-nums;}
.clock-right{text-align:right;}
.clock-day{font-size:17px;font-weight:800;color:var(--white);letter-spacing:3px;text-transform:uppercase;}
.clock-date{font-size:13px;color:var(--muted);margin-top:4px;}

/* ══ PARTE CENTRAL AMPLIADA ══ */
.main-split {
  display: flex;
  padding: 0 60px;
  flex: 1;
  overflow: hidden;
  margin-top: 25px;
  margin-bottom: 85px; 
  position: relative;
}

.conteudo-imagem {
  position: absolute;
  top: 0;
  bottom: 0;
  left: 60px;
  right: 60px;
  opacity: 0;
  transition: opacity 1.2s ease-in-out;
  pointer-events: none;
  display: flex;
  justify-content: center;
  align-items: center;
}

.conteudo-imagem.active {
  opacity: 1;
  pointer-events: all;
}

.conteudo-imagem img {
  width: 100% !important;
  height: 100% !important;
  object-fit: fill !important; 
  border-radius: 4px !important;
}

/* ══ TICKER ══ */
.ticker-bar{position:absolute;bottom:0;left:0;right:0;height:54px;
  background:linear-gradient(90deg,var(--red-dark),var(--red),var(--red-dark));
  display:flex;align-items:center;overflow:hidden;z-index:50;flex-shrink:0;}
.ticker-pill{flex-shrink:0;padding:0 18px;height:100%;background:rgba(0,0,0,0.22);
  display:flex;align-items:center;font-size:10px;font-weight:800;letter-spacing:3px;
  color:rgba(255,255,255,0.75);text-transform:uppercase;}
.ticker-track{flex:1;overflow:hidden;}
.ticker-inner{display:inline-flex;white-space:nowrap;animation:scroll-ticker 32s linear infinite;}
@keyframes scroll-ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ticker-inner span{font-size:14px;font-weight:700;color:#fff;padding:0 44px;}
.ticker-inner span::before{content:'✦';margin-right:12px;opacity:.5;}

/* ══ DOTS ══ */
#slide-dots{position:fixed;right:20px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:10px;z-index:200;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(192,57,43,0.3);transition:all .3s;}
.dot.on{background:var(--red);transform:scale(1.5);}
</style>
</head>
<body>

<!-- Os pontinhos agora começam vazios, o script vai criar eles -->
<div id="slide-dots"></div>

<div id="slides-wrap">
  <div class="slide-bg"></div>

  <!-- FIXED HEADER -->
  <header class="site-header">
<div class="logo-wrap">
  <img src="https://docs.google.com/uc?export=view&id=16QFAzlZk54GedXeQ45chXr1IX2n3Q5_Q" alt="Igreja Holiness" style="height: 48px; width: auto; display: block;">
</div>
    <div class="header-info">
      <div class="header-city">Pompeia — SP</div>
      <div class="header-motto">Vivendo em unidade, servindo com amor</div>
    </div>
  </header>

  <!-- FIXED CLOCK BAR -->
  <div class="clock-bar">
    <div class="clock-time" id="clock1">00:00</div>
    <div class="clock-right">
      <div class="clock-day" id="day1">—</div>
      <div class="clock-date" id="date1">—</div>
    </div>
  </div>

  <!-- PARTE CENTRAL MAXIMIZADA E VAZIA (ESPERANDO O DRIVE) -->
  <div class="main-split" id="centro-dinamico">
    <!-- O Javascript vai injetar as imagens aqui automaticamente! -->
  </div>

  <!-- FIXED TICKER -->
  <div class="ticker-bar">
    <div class="ticker-pill">Avisos</div>
    <div class="ticker-track">
      <div class="ticker-inner">
        <span>Seja bem-vindo à nossa comunidade!</span>
        <span>Culto de Celebração aos Sábados às 19h.</span>
        <span>Escola Bíblica aos Domingos às 9h.</span>
      </div>
    </div>
  </div>

</div>

<script>
// 1. MOTOR DO RELÓGIO FIXO
function atualizarRelogio() {
  const agora = new Date();
  const horas = String(agora.getHours()).padStart(2, "0");
  const minutos = String(agora.getMinutes()).padStart(2, "0");
  
  const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
  const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

  document.getElementById("clock1").textContent = `${horas}:${minutos}`;
  document.getElementById("day1").textContent = diasSemana[agora.getDay()];
  document.getElementById("date1").textContent = `${agora.getDate()} de ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// 2. MOTOR MÁGICO DO GOOGLE DRIVE (LINK INTEGRADO)
const urlDoScript = "https://script.google.com/macros/s/AKfycbx0vgw5w6lvEEwbjNhKD9h_rXhIcNGmUwJMC1ia1EjnG3QYXvRW3hLC3w5Gtfv_uukn/exec";

async function carregarImagensDoDrive() {
  try {
    const resposta = await fetch(urlDoScript);
    const ids = await resposta.json();
    
    const containerImagens = document.getElementById('centro-dinamico');
    const containerDots = document.getElementById('slide-dots');
    
    // Se a pasta estiver vazia, encerra aqui
    if(ids.length === 0) return; 

    // Cria as imagens e os pontinhos dinamicamente usando a API de renderização direta do Google
    ids.forEach((id, index) => {
      // Cria a div da imagem
      const div = document.createElement('div');
      div.className = index === 0 ? 'conteudo-imagem active' : 'conteudo-imagem';
      const img = document.createElement('img');
      img.src = `https://lh3.googleusercontent.com/d/${id}`;
      div.appendChild(img);
      containerImagens.appendChild(div);

      // Cria o pontinho correspondente
      const dot = document.createElement('div');
      dot.className = index === 0 ? 'dot on' : 'dot';
      containerDots.appendChild(dot);
    });

    // Se tiver mais de 1 imagem, liga o motor do carrossel
    if(ids.length > 1) {
      iniciarCarrossel();
    }

  } catch (erro) {
    console.error("Erro ao puxar imagens da pasta:", erro);
  }
}

// 3. MOTOR DE TROCA DE IMAGENS
let slideAtual = 0;
function iniciarCarrossel() {
  setInterval(() => {
    const imagens = document.querySelectorAll(".conteudo-imagem");
    const dots = document.querySelectorAll(".dot");
    
    if(imagens.length === 0) return;

    imagens[slideAtual].classList.remove("active");
    if(dots[slideAtual]) dots[slideAtual].classList.remove("on");

    slideAtual = (slideAtual + 1) % imagens.length;

    imagens[slideAtual].classList.add("active");
    if(dots[slideAtual]) dots[slideAtual].classList.add("on");
    
  }, 10000); // 10 segundos por imagem
}

// Dá a partida na busca assim que a TV liga
carregarImagensDoDrive();
</script>

</body>
</html>
